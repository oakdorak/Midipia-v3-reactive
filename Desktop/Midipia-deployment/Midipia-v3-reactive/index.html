<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Beat - 49 Key Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="debug-log">Stage Assembling... Waiting for MIDI.</div>

    <div id="controls-panel">
        <div id="song-selector">
            <button class="song-btn" onclick="playSong('twinkle')">Twinkle</button>
            <button class="song-btn" onclick="playSong('mary')">Mary</button>
            <button class="song-btn" onclick="playSong('ode')">Ode to Joy</button>
            <button class="song-btn" onclick="currentSong = null; document.getElementById('debug-log').innerText = 'Free Play Mode'; score = 0; document.getElementById('score').innerText = '0';">Free Play</button>
            
            <label class="custom-file-upload">
                <input type="file" id="midi-upload" accept=".mid,.midi">
                Upload .MID
            </label>
        </div>
        
        <div id="speed-control">
            <label for="speed-slider">Speed: <span id="speed-display">1.0</span>x</label>
            <input type="range" id="speed-slider" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
    </div>

    <div id="game-container">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        
        <div class="highway" id="highway">
            <div id="strike-zone"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    
    <script src="script.js"></script>
</body>
</html>
